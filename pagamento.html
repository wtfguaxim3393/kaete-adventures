<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagamento - Kaete Adventures</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="pag-bg">

<button class="btn-voltar" onclick="voltarPagina()">
← Voltar
</button>

<div class="pag-container">

<h2>💳 Reservar viagem</h2>
<p class="sub">Finalize sua reserva com segurança</p>

<form class="pagamento">

<label>Destino</label>

<select>
<option>Vila Tepequém</option>
<option>Nobres</option>
<option>Serra do Roncador</option>
</select>

<label>Forma de pagamento</label>

<select id="metodo" onchange="trocarMetodo()">

<option value="cartao">Cartão</option>
<option value="pix">Pix</option>
<option value="carteira">Carteira digital</option>

</select>

<!-- CARTÃO -->
<div id="cartao" class="box">

<input type="text" placeholder="Nome no cartão">
<input type="text" placeholder="Número do cartão">
<input type="text" placeholder="Validade (MM/AA)">
<input type="text" placeholder="CVV">

</div>

<!-- PIX -->
<div id="pix" class="box hidden">

<p>📱 Pague com Pix</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=KaeteAdventuresPix">

<p class="pix-chave">Chave Pix: kaete@adventures.com</p>

</div>

<!-- CARTEIRA DIGITAL -->
<div id="carteira" class="box hidden">

<p>💼 Escolha sua carteira digital</p>

<button type="button" class="wallet">Google Pay</button>
<button type="button" class="wallet">Apple Pay</button>
<button type="button" class="wallet">Mercado Pago</button>

</div>

<label>🌱 Doação ambiental</label>

<select class="doacao">
<option>Não doar</option>
<option>Doar R$5</option>
<option>Doar R$10</option>
<option>Doar R$20</option>
</select>

<button class="finalizar" type="submit">
Finalizar pagamento
</button>

</form>

</div>

<script>

function trocarMetodo(){

let metodo = document.getElementById("metodo").value

document.getElementById("cartao").classList.add("hidden")
document.getElementById("pix").classList.add("hidden")
document.getElementById("carteira").classList.add("hidden")

document.getElementById(metodo).classList.remove("hidden")

}



</script>

<script>

function voltarPagina(){
history.back();
}

</script>

</body>

</html>
